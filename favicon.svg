<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <rect x="4" y="20" width="24" height="4" rx="2" fill="#333"/>
  <rect x="4" y="20" width="14" height="4" rx="2" fill="#4a9eff" class="bar"/>
  <circle cx="16" cy="10" r="4" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
  <line x1="16" y1="10" x2="16" y2="7" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round"/>
  <style>
    .bar { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
</svg>
